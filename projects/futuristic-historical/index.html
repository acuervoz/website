<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POSTCORD ARCHIVE // FUTURISTIC HISTORICAL</title>
  <style>
    @import url('https://unpkg.com/@fontsource/ibm-plex-mono/index.css');

    :root {
      --bg:          #0d0d0d;
      --bg2:         #111110;
      --text:        #ede8df;
      --bright:      #ede8df;
      --dim:         #9a9488;
      --ghost:       #4a4a40;
      --faint:       #333328;
      --border:      #1a1a16;
      --sel-bg:      rgba(255, 106, 119, 0.12);
      --sel-border:  rgba(255, 106, 119, 0.25);
      --active-bg:   #ff6a77;
      --active-fg:   #0d0d0d;
      --accent:      #ff6a77;
      --font: 'IBM Plex Mono', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: var(--font);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.1) 3px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    /* ── Terminal window ── */
    .terminal {
      width:   min(880px, 96vw);
      height:  min(580px, 92vh);
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      box-shadow:
        0 0 0 1px rgba(255,106,119,0.03),
        0 0 50px rgba(255,106,119,0.05),
        inset 0 0 80px rgba(0,0,0,0.25);
    }

    /* ── Header bar ── */
    .term-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0.38rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      user-select: none;
    }
    .bar-title {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--accent);
    }
    .bar-right {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--ghost);
    }
    .bar-right .online { color: var(--dim); }

    /* ── Shared view layout ── */
    .term-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0.85rem 1.1rem 0.7rem;
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }

    .term-rule {
      border: none;
      border-top: 1px solid var(--ghost);
      margin: 0.45rem 0;
      flex-shrink: 0;
      opacity: 0.55;
    }

    /* ── LIST VIEW ── */
    #view-list { display: flex; }
    #view-story { display: none; }

    .term-prompt {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.65;
      margin-bottom: 0.55rem;
      flex-shrink: 0;
    }
    .term-prompt .cursor-prefix {
      color: var(--text);
      margin-right: 0.4em;
    }

    /* Two-column area */
    .term-cols {
      display: flex;
      gap: 0;
      flex: 1;
      overflow: hidden;
      margin: 0.3rem 0;
    }

    .list-col {
      flex: 1;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    /* Story entry row */
    .term-entry {
      display: flex;
      align-items: baseline;
      gap: 0.55rem;
      padding: 0.32rem 0.45rem;
      cursor: pointer;
      user-select: none;
      border: 1px solid transparent;
      transition: background 60ms;
    }

    .e-arrow {
      width: 1.1em;
      font-size: 10px;
      color: var(--text);
      flex-shrink: 0;
      visibility: hidden;
    }
    .e-num {
      font-size: 10px;
      color: var(--ghost);
      flex-shrink: 0;
      min-width: 4.5ch;
    }
    .e-title {
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--dim);
      flex: 1;
    }
    /* Focused (hover / keyboard) */
    .term-entry.focused {
      background: var(--sel-bg);
      border-color: var(--sel-border);
    }
    .term-entry.focused .e-arrow  { visibility: visible; }
    .term-entry.focused .e-title  { color: var(--text); }
    .term-entry.focused .e-num    { color: var(--dim); }

    /* Active flash */
    .term-entry.flash {
      background: var(--active-bg);
    }
    .term-entry.flash .e-arrow,
    .term-entry.flash .e-title,
    .term-entry.flash .e-num { color: var(--active-fg); }

    /* Home row */
    .term-entry.is-home .e-title {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--ghost);
    }
    .term-entry.is-home.focused .e-title { color: var(--dim); }

    /* Description panel (right) */
    .desc-col {
      width: 270px;
      flex-shrink: 0;
      border-left: 1px solid var(--ghost);
      padding-left: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .desc-label {
      font-size: 8.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ghost);
      margin-bottom: 0.5rem;
    }
    .desc-text {
      font-size: 11px;
      color: var(--ghost);
      line-height: 1.75;
      transition: color 120ms;
    }
    .desc-col.active .desc-text { color: var(--dim); }

    /* Hint bar */
    .term-hints {
      flex-shrink: 0;
      border-top: 1px solid var(--ghost);
      padding-top: 0.38rem;
      margin-top: 0.2rem;
      font-size: 9px;
      color: var(--ghost);
      letter-spacing: 0.08em;
      display: flex;
      gap: 2rem;
      user-select: none;
      opacity: 0.7;
    }

    /* ── STORY VIEW ── */
    .story-meta {
      flex-shrink: 0;
      margin-bottom: 0.45rem;
    }
    .story-back {
      font-size: 10px;
      color: var(--ghost);
      cursor: pointer;
      letter-spacing: 0.1em;
      display: inline-block;
      margin-bottom: 0.35rem;
    }
    .story-back:hover { color: var(--dim); }

    .story-title {
      font-size: 13px;
      color: var(--bright);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      line-height: 1.3;
    }
    .story-info {
      font-size: 9px;
      color: var(--ghost);
      letter-spacing: 0.1em;
      margin-top: 0.25rem;
    }

    .story-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.35rem 0.5rem 0 0;
      font-size: 12px;
      color: var(--dim);
      line-height: 1.85;
    }

    /* Markdown within terminal */
    .story-body p           { margin-bottom: 1rem; }
    .story-body h2          {
      font-size: 9.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      font-weight: normal;
      margin: 1.5rem 0 0.5rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--ghost);
    }
    .story-body blockquote  {
      border-left: 1px solid var(--ghost);
      padding-left: 0.75rem;
      margin: 0.75rem 0;
      font-size: 11px;
    }
    .story-body blockquote p { color: var(--ghost); margin-bottom: 0.25rem; }
    .story-body strong      { color: var(--text); font-weight: normal; }
    .story-body em          { font-style: italic; }
    .story-body a           { color: var(--dim); }
    .story-body hr          { border: none; border-top: 1px solid var(--ghost); margin: 1rem 0; opacity: 0.4; }
    .story-body ul,
    .story-body ol          { padding-left: 1.5rem; margin-bottom: 1rem; }
    .story-body li          { margin-bottom: 0.2rem; }

    .story-hint {
      flex-shrink: 0;
      border-top: 1px solid var(--ghost);
      padding-top: 0.38rem;
      margin-top: 0.2rem;
      font-size: 9px;
      color: var(--ghost);
      letter-spacing: 0.08em;
      user-select: none;
      opacity: 0.7;
    }

    .sys-msg {
      font-size: 11px;
      color: var(--ghost);
      letter-spacing: 0.06em;
    }

    /* Scrollbar */
    ::-webkit-scrollbar       { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ghost); }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    .blink { animation: blink 1.1s step-end infinite; }

    @media (max-width: 600px) {
      .desc-col { display: none; }
    }
  </style>
</head>
<body>

<div class="terminal">

  <!-- Header bar -->
  <div class="term-bar">
    <span class="bar-title">POSTCORD ARCHIVE // FUTURISTIC HISTORICAL</span>
    <span class="bar-right"><span class="online">ONLINE</span>&nbsp;&nbsp;<span class="blink">█</span></span>
  </div>

  <!-- ── LIST VIEW ── -->
  <div class="term-view" id="view-list">

    <div class="term-prompt">
      <span class="cursor-prefix">&gt;</span>POSTCORDS ARCHIVE — EVENTS THAT HAPPENED IN THE FUTURE.<br>
      <span class="cursor-prefix">&gt;</span>SELECT A POSTCORD TO RETRIEVE.
    </div>

    <hr class="term-rule">

    <div class="term-cols">
      <div class="list-col" id="term-list"></div>
      <div class="desc-col" id="desc-col">
        <div class="desc-label">// record info</div>
        <div class="desc-text" id="desc-text">—</div>
      </div>
    </div>

    <hr class="term-rule">
    <div class="term-hints">
      <span>↑ ↓ &nbsp;NAVIGATE</span>
      <span>ENTER &nbsp;OPEN</span>
      <span>ESC &nbsp;BACK</span>
    </div>

  </div>

  <!-- ── STORY VIEW ── -->
  <div class="term-view" id="view-story">

    <div class="story-meta">
      <div class="story-back" id="story-back">← BACK TO ARCHIVE &nbsp;[ESC]</div>
      <div class="story-title" id="story-title"></div>
      <div class="story-info" id="story-info"></div>
    </div>

    <hr class="term-rule">

    <div class="story-body" id="story-body">
      <p class="sys-msg">&gt; RETRIEVING RECORD…</p>
    </div>

    <hr class="term-rule">
    <div class="story-hint">ESC — BACK TO ARCHIVE</div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  var STORIES = [
    {
      title: "The machine god's manifesto",
      type:  'fiction',
      desc:  "Someone's last attempt at saving you from the Machine god's grasp.",
      file:  'the-machine-gods-manifesto/the-machine-gods-manifesto.md'
    }
  ];

  var HOME = { title: 'home', type: null, desc: 'Return to the main site.' };
  var ALL  = STORIES.concat([HOME]);

  var curIdx  = 0;
  var inStory = false;
  var rows    = [];

  var listEl  = document.getElementById('term-list');
  var descCol = document.getElementById('desc-col');
  var descTxt = document.getElementById('desc-text');

  // ── Build rows ────────────────────────────────────────
  ALL.forEach(function(item, i) {
    var el   = document.createElement('div');
    var isH  = (item === HOME);
    el.className = 'term-entry' + (isH ? ' is-home' : '');

    var num  = isH ? '[--]' : '[' + String(i + 1).padStart(2, '0') + ']';

    el.innerHTML =
      '<span class="e-arrow">▶</span>' +
      '<span class="e-num">'   + num + '</span>' +
      '<span class="e-title">' + item.title.toUpperCase() + '</span>';

    el.addEventListener('mouseenter', function() { setFocus(i); });
    el.addEventListener('click',      function() { activate(i); });

    listEl.appendChild(el);
    rows.push(el);
  });

  // ── Focus ─────────────────────────────────────────────
  function setFocus(idx) {
    curIdx = idx;
    rows.forEach(function(el, i) {
      el.classList.toggle('focused', i === idx);
    });
    descTxt.textContent = ALL[idx].desc || '—';
    descCol.classList.add('active');
  }

  // ── Activate ──────────────────────────────────────────
  function activate(idx) {
    rows[idx].classList.add('flash');
    setTimeout(function() {
      rows[idx].classList.remove('flash');
      if (ALL[idx] === HOME) {
        window.location.href = '/';
      } else {
        openStory(ALL[idx]);
      }
    }, 140);
  }

  // ── Story view ────────────────────────────────────────
  function openStory(item) {
    inStory = true;
    document.getElementById('view-list').style.display  = 'none';
    document.getElementById('view-story').style.display = 'flex';

    document.getElementById('story-title').textContent =
      item.title.toUpperCase();
    document.getElementById('story-info').textContent = 'FUTURISTIC HISTORICAL';

    var body = document.getElementById('story-body');
    body.innerHTML = '<p class="sys-msg">&gt; RETRIEVING RECORD…</p>';
    body.scrollTop = 0;

    fetch(item.file)
      .then(function(r) { return r.text(); })
      .then(function(t) { body.innerHTML = marked.parse(t); })
      .catch(function()  {
        body.innerHTML = '<p class="sys-msg">&gt; ERROR: RECORD NOT FOUND.</p>';
      });
  }

  function closeStory() {
    inStory = false;
    document.getElementById('view-story').style.display = 'none';
    document.getElementById('view-list').style.display  = 'flex';
    document.getElementById('story-body').innerHTML = '';
  }

  document.getElementById('story-back').addEventListener('click', closeStory);

  // ── Keyboard ──────────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    if (inStory) {
      if (e.key === 'Escape') closeStory();
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setFocus(Math.min(curIdx + 1, ALL.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setFocus(Math.max(curIdx - 1, 0));
    } else if (e.key === 'Enter') {
      activate(curIdx);
    } else if (e.key === 'Escape') {
      window.location.href = '/';
    }
  });

  setFocus(0);
</script>

</body>
</html>
