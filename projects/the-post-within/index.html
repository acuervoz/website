<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="The Post Within — A Cuervoz" />
<title>The Post Within — A Cuervoz</title>
<link rel="canonical" href="/projects/the-post-within/" />
<style>
  :root {
    --bg:         #0d0d0d;
    --text:       #ede8df;
    --text-muted: #9a9488;
    --text-dim:   #4a4a40;
    --text-ghost: #333328;
    --accent:     #ff6a77;
    --serif:      'Times New Roman', Times, Georgia, serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--serif);
  }

  body {
    max-width: 980px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 5rem;
  }

  a { color: inherit; }

  /* ── Masthead ── */
  .dateline {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--text-ghost);
  }

  .masthead { text-align: center; padding: 1.6rem 0 1.1rem; }

  .masthead h1 {
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: normal;
    line-height: 1.05;
  }

  .masthead .tagline {
    font-style: italic;
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 0.5rem;
    letter-spacing: 0.02em;
  }

  .rule       { border: none; border-top: 3px solid var(--text); margin-top: 1.3rem; }
  .rule-thin  { border: none; border-top: 1px solid var(--text); margin-top: 0.25rem; }

  .post-nav {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    padding: 0.7rem 0;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .post-nav a { text-decoration: none; cursor: pointer; }
  .post-nav a:hover { color: var(--accent); }
  .post-nav .sep { color: var(--text-ghost); }

  /* ── Lead (top) story ── */
  .lead-teaser {
    text-align: center;
    border-top: 3px solid var(--text);
    padding-top: 1rem;
    margin-bottom: 2.4rem;
    cursor: pointer;
  }
  .lead-teaser:hover h3 { color: var(--accent); }
  .lead-teaser .blurb { max-width: 560px; margin: 0.7rem auto 0; }

  /* ── Eye row (2 stories flanking the eye) ── */
  .eye-row {
    display: grid;
    grid-template-columns: 1fr minmax(220px, 280px) 1fr;
    gap: 2.5rem;
    align-items: center;
  }
  .col-eye { display: flex; justify-content: center; }

  .eye-sep {
    border: none;
    border-top: 1px solid var(--text-ghost);
    margin: 2.2rem 0;
  }

  /* ── Below row (2 stories under the eye) ── */
  .below-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2.5rem;
  }

  @media (max-width: 820px) {
    .eye-row { grid-template-columns: 1fr; gap: 1.8rem; }
    .col-eye { display: none; }
    .below-row { grid-template-columns: 1fr; gap: 1.8rem; }
    .eye-sep { margin: 1.8rem 0; }
  }

  .teaser {
    border-top: 1px solid var(--text-ghost);
    padding-top: 0.7rem;
    cursor: pointer;
  }
  .teaser h3, .lead-teaser h3 {
    font-size: clamp(1.6rem, 4vw, 2.3rem);
    font-weight: normal;
    line-height: 1.25;
    transition: color 120ms;
  }
  .teaser:hover h3 { color: var(--accent); }
  .teaser .meta, .lead-teaser .meta {
    font-size: 10.5px;
    font-style: italic;
    color: var(--text-dim);
    margin-top: 0.4rem;
  }
  .teaser .blurb, .lead-teaser .blurb {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-top: 0.6rem;
  }

  /* ── Eye ── */
  .eye-wrap {
    width: 100%;
    max-width: 260px;
    user-select: none;
  }
  #eye-svg { width: 100%; height: auto; overflow: visible; display: block; }
  #eye-svg .eye-outline { fill: none; stroke: var(--accent); stroke-width: 4; }
  #eye-svg .iris         { fill: none; stroke: var(--accent); stroke-width: 3; }
  #eye-svg .pupil        { fill: var(--accent); }

  @keyframes blinkAnim {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(0.04); }
  }
  #eye-svg.blinking { animation: blinkAnim 0.22s ease-in-out; transform-origin: center; }

  /* Fixed corner eye — mobile only */
  #eye-slot-mobile {
    display: none;
    position: fixed;
    top: 12px;
    left: 12px;
    width: 74px;
    z-index: 9999;
    pointer-events: none;
  }
  @media (max-width: 820px) {
    #eye-slot-mobile { display: block; }
  }

  /* ── Shared view ── */
  .view { display: none; }
  .view.active { display: block; }

  .back-link {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    margin-bottom: 1.2rem;
  }
  .back-link:hover { color: var(--accent); }

  .section-title {
    font-size: 1.6rem;
    font-weight: normal;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 1.3rem;
  }

  /* ── Archive list ── */
  .archive-list { list-style: none; }
  .archive-row {
    display: flex;
    gap: 1.2rem;
    align-items: baseline;
    padding: 0.85rem 0;
    border-top: 1px solid var(--text-ghost);
    cursor: pointer;
  }
  .archive-row:last-child { border-bottom: 1px solid var(--text-ghost); }
  .archive-row .a-date {
    font-size: 11px;
    font-style: italic;
    color: var(--text-dim);
    flex-shrink: 0;
    width: 8.5em;
  }
  .archive-row .a-title {
    font-size: 15px;
    transition: color 120ms;
  }
  .archive-row:hover .a-title { color: var(--accent); }

  /* ── Story view ── */
  .story-headline {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: normal;
    line-height: 1.2;
    margin-bottom: 0.4rem;
  }
  .story-meta {
    font-size: 11px;
    font-style: italic;
    color: var(--text-dim);
    margin-bottom: 1.6rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .story-body { font-size: 15px; line-height: 1.85; color: var(--text); }
  .story-body p { margin-bottom: 1.1rem; }
  .story-body h2 { font-size: 1.2rem; font-weight: normal; margin: 1.6rem 0 0.6rem; }
  .story-body blockquote {
    border-left: 2px solid var(--text-ghost);
    padding-left: 1rem;
    font-style: italic;
    color: var(--text-muted);
    margin: 1rem 0;
  }
  .story-body em { font-style: italic; }
  .story-body strong { font-weight: bold; }
  .story-body hr { border: none; border-top: 1px solid var(--text-ghost); margin: 1.5rem 0; }

  footer {
    margin-top: 3.5rem;
    padding-top: 1.2rem;
    border-top: 1px solid var(--text-ghost);
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-ghost);
    text-align: center;
  }
</style>
</head>
<body>

  <!-- Fixed corner eye — only shown/active on mobile; JS moves the real eye node here -->
  <div id="eye-slot-mobile" aria-hidden="true"></div>

  <div class="dateline">
    <span>Established within</span>
    <span>Vol. I &middot; No. 1</span>
  </div>

  <header class="masthead">
    <h1>The Post Within</h1>
    <p class="tagline">dispatches from the inside</p>
  </header>

  <hr class="rule">
  <nav class="post-nav">
    <a href="/">Home</a>
    <span class="sep">&middot;</span>
    <a id="nav-deeper">Deeper within</a>
  </nav>
  <hr class="rule-thin">
  <div style="margin-bottom: 2.2rem;"></div>

  <!-- ── Front page ── -->
  <section id="view-front" class="view active">
    <article class="lead-teaser" id="lead-teaser"></article>

    <div class="eye-row">
      <div id="beside-left"></div>
      <div class="col-eye" id="eye-slot-desktop"></div>
      <div id="beside-right"></div>
    </div>

    <hr class="eye-sep">

    <div class="below-row">
      <div id="below-left"></div>
      <div id="below-right"></div>
    </div>
  </section>

  <!-- ── Archive ── -->
  <section id="view-archive" class="view">
    <p class="back-link" id="archive-back">&larr; front page</p>
    <h2 class="section-title">Deeper Within &mdash; The Archive</h2>
    <ol class="archive-list" id="archive-list"></ol>
  </section>

  <!-- ── Story ── -->
  <section id="view-story" class="view">
    <p class="back-link" id="story-back">&larr; back</p>
    <h2 class="story-headline" id="story-headline"></h2>
    <p class="story-meta" id="story-meta"></p>
    <div class="story-body" id="story-body"></div>
  </section>

  <footer>made by hand &middot; no trackers &middot; no cookies &middot; acuervoz.com</footer>

  <noscript>
    <p style="margin-top:2rem; font-style:italic; color:var(--text-muted);">
      JavaScript is off — the interactive front page needs it. Head back
      <a href="/" style="text-decoration:underline;">home</a> instead.
    </p>
  </noscript>

  <!-- The eye itself — JS relocates this single node between the desktop and mobile slots -->
  <div class="eye-wrap" id="eye-wrap">
    <svg id="eye-svg" viewBox="0 0 300 180" aria-hidden="true">
      <defs>
        <clipPath id="eyeClip">
          <path d="M8,90 Q150,4 292,90 Q150,176 8,90 Z" />
        </clipPath>
      </defs>
      <path class="eye-outline" d="M8,90 Q150,4 292,90 Q150,176 8,90 Z" />
      <g clip-path="url(#eyeClip)">
        <g id="eyeball">
          <circle class="iris" cx="150" cy="90" r="34" />
          <circle class="pupil" cx="150" cy="90" r="12" />
        </g>
      </g>
    </svg>
  </div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  /*
   * PLACEHOLDER CONTENT — replace title/date/blurb/file for each story below,
   * and replace the text inside the-post-within-0X.md with the real pieces.
   * STORIES[0] runs as the lead (top) story; STORIES[1..2] flank the eye;
   * STORIES[3..4] sit below it. The archive is sorted by `date` automatically,
   * newest first.
   */
  var STORIES = [
    { title: 'Placeholder Headline One',   date: '2026-05-02', blurb: 'Replace this teaser with a one- or two-sentence hook for the real story.', file: 'the-post-within-01/the-post-within-01.md' },
    { title: 'Placeholder Headline Two',   date: '2025-11-14', blurb: 'Replace this teaser with a one- or two-sentence hook for the real story.', file: 'the-post-within-02/the-post-within-02.md' },
    { title: 'Placeholder Headline Three', date: '2026-01-22', blurb: 'Replace this teaser with a one- or two-sentence hook for the real story.', file: 'the-post-within-03/the-post-within-03.md' },
    { title: 'Placeholder Headline Four',  date: '2025-08-30', blurb: 'Replace this teaser with a one- or two-sentence hook for the real story.', file: 'the-post-within-04/the-post-within-04.md' },
    { title: 'Placeholder Headline Five',  date: '2026-03-11', blurb: 'Replace this teaser with a one- or two-sentence hook for the real story.', file: 'the-post-within-05/the-post-within-05.md' }
  ];

  function formatDate(iso) {
    var d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function buildTeaser(container, story) {
    var el = document.createElement('article');
    el.className = 'teaser';
    el.innerHTML =
      '<h3>' + story.title + '</h3>' +
      '<div class="meta">' + formatDate(story.date) + '</div>' +
      '<p class="blurb">' + story.blurb + '</p>';
    el.addEventListener('click', function() { openStory(story, 'front'); });
    container.appendChild(el);
  }

  // ── Lead story ─────────────────────────────────────────
  var LEAD = STORIES[0];
  var leadEl = document.getElementById('lead-teaser');
  leadEl.innerHTML =
    '<h3>' + LEAD.title + '</h3>' +
    '<div class="meta">' + formatDate(LEAD.date) + '</div>' +
    '<p class="blurb">' + LEAD.blurb + '</p>';
  leadEl.addEventListener('click', function() { openStory(LEAD, 'front'); });

  // ── 2 beside the eye, 2 below it ──────────────────────
  buildTeaser(document.getElementById('beside-left'),  STORIES[1]);
  buildTeaser(document.getElementById('beside-right'), STORIES[2]);
  buildTeaser(document.getElementById('below-left'),   STORIES[3]);
  buildTeaser(document.getElementById('below-right'),  STORIES[4]);

  // ── Build archive (sorted by date, newest first) ──────
  var archiveList = document.getElementById('archive-list');
  var sorted = STORIES.slice().sort(function(a, b) {
    return new Date(b.date) - new Date(a.date);
  });
  sorted.forEach(function(story) {
    var li = document.createElement('li');
    li.className = 'archive-row';
    li.innerHTML =
      '<span class="a-date">' + formatDate(story.date) + '</span>' +
      '<span class="a-title">' + story.title + '</span>';
    li.addEventListener('click', function() { openStory(story, 'archive'); });
    archiveList.appendChild(li);
  });

  // ── View switching ────────────────────────────────────
  var views = {
    front:   document.getElementById('view-front'),
    archive: document.getElementById('view-archive'),
    story:   document.getElementById('view-story')
  };
  var lastView = 'front';

  function showView(name) {
    Object.keys(views).forEach(function(k) {
      views[k].classList.toggle('active', k === name);
    });
  }

  document.getElementById('nav-deeper').addEventListener('click', function(e) {
    e.preventDefault();
    lastView = 'archive';
    showView('archive');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  document.getElementById('archive-back').addEventListener('click', function() {
    showView('front');
  });
  document.getElementById('story-back').addEventListener('click', function() {
    showView(lastView === 'story' ? 'front' : lastView);
  });

  function openStory(story, from) {
    lastView = from;
    document.getElementById('story-headline').textContent = story.title;
    document.getElementById('story-meta').textContent = formatDate(story.date);
    var body = document.getElementById('story-body');
    body.innerHTML = '<p><em>loading…</em></p>';
    showView('story');
    window.scrollTo({ top: 0, behavior: 'smooth' });

    fetch(story.file)
      .then(function(r) { return r.text(); })
      .then(function(t) { body.innerHTML = marked.parse(t); })
      .catch(function() {
        body.innerHTML = '<p><em>Could not load this story.</em></p>';
      });
  }

  // ── Eye: shared refs ───────────────────────────────────
  var eyeWrap  = document.getElementById('eye-wrap');
  var eyeSvg   = document.getElementById('eye-svg');
  var eyeball  = document.getElementById('eyeball');
  var maxOffset = 22; // svg user units, same scale regardless of rendered size

  // ── Eye: blink on ANY click, anywhere on the page ─────
  function triggerBlink() {
    eyeSvg.classList.remove('blinking');
    void eyeSvg.offsetWidth; // force reflow so the animation can restart
    eyeSvg.classList.add('blinking');
  }
  document.addEventListener('click', triggerBlink);
  eyeSvg.addEventListener('animationend', function() {
    eyeSvg.classList.remove('blinking');
  });

  // ── Desktop: pupil follows the cursor ─────────────────
  function updateEyeFromPointer(clientX, clientY) {
    if (mode !== 'desktop') return;
    var rect = eyeSvg.getBoundingClientRect();
    if (!rect.width) return;
    var scale = 300 / rect.width; // viewBox width / rendered width
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var dx = (clientX - cx) * scale;
    var dy = (clientY - cy) * scale;
    var dist = Math.sqrt(dx * dx + dy * dy) || 1;
    var clamp = Math.min(1, maxOffset / dist);
    eyeball.setAttribute('transform', 'translate(' + (dx * clamp) + ',' + (dy * clamp) + ')');
  }
  document.addEventListener('mousemove', function(e) {
    updateEyeFromPointer(e.clientX, e.clientY);
  });

  // ── Mobile: eye starts looking at the last touched spot,
  //    then keeps watching that point as the page scrolls,
  //    resetting back to it once it drifts off-screen ────
  var lastTouchVX = null; // last touch position, viewport px
  var lastTouchVY = null;
  var targetDocY  = null;

  function anchorViewportY() {
    return lastTouchVY !== null ? lastTouchVY : window.innerHeight / 2;
  }

  function resetScrollAnchor() {
    targetDocY = window.scrollY + anchorViewportY();
  }

  function updateEyeFromScroll() {
    if (mode !== 'mobile') return;
    if (targetDocY === null) resetScrollAnchor();
    var viewportY = targetDocY - window.scrollY;
    if (viewportY < 0 || viewportY > window.innerHeight) {
      resetScrollAnchor();
      viewportY = anchorViewportY();
    }
    var normY = (viewportY / window.innerHeight) - 0.5; // -0.5 .. 0.5
    var dy = normY * 2 * maxOffset;

    var vx = lastTouchVX !== null ? lastTouchVX : (window.innerWidth / 2);
    var normX = (vx / window.innerWidth) - 0.5;
    var dx = normX * 2 * maxOffset;

    eyeball.setAttribute('transform', 'translate(' + dx + ',' + dy + ')');
  }
  window.addEventListener('scroll', updateEyeFromScroll, { passive: true });

  document.addEventListener('touchstart', function(e) {
    if (mode !== 'mobile') return;
    if (!e.touches || !e.touches.length) return;
    lastTouchVX = e.touches[0].clientX;
    lastTouchVY = e.touches[0].clientY;
    resetScrollAnchor();
    updateEyeFromScroll();
  }, { passive: true });

  // ── Mode switching: relocate the single eye node ──────
  var mql = window.matchMedia('(max-width: 820px)');
  var desktopSlot = document.getElementById('eye-slot-desktop');
  var mobileSlot  = document.getElementById('eye-slot-mobile');
  var mode = mql.matches ? 'mobile' : 'desktop';

  function placeEye() {
    mode = mql.matches ? 'mobile' : 'desktop';
    if (mode === 'mobile') {
      mobileSlot.appendChild(eyeWrap);
      resetScrollAnchor();
      updateEyeFromScroll();
    } else {
      desktopSlot.appendChild(eyeWrap);
      eyeball.setAttribute('transform', 'translate(0,0)');
    }
  }
  placeEye();
  (mql.addEventListener ? mql.addEventListener.bind(mql) : mql.addListener.bind(mql))('change', placeEye);
</script>

</body>
</html>
